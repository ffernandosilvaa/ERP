<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auravita — Protótipo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text: #1a1a1a;
            --text-muted: #555;
            --text-faint: #888;
            --border: #e5e5e5;
            --border-strong: #d1d5db;
            --accent: #6E2A3B;
            --accent-2: #5C7A60;
            --accent-soft: #f0e4e7;
            --danger: #c23d3d;
            --warn: #e6a23c;
        }
        
        [data-theme="dark"] {
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #f0f0f0;
            --text-muted: #aaa;
            --text-faint: #777;
            --border: #333;
            --border-strong: #444;
            --accent-soft: #3a2a2f;
        }

        * { box-sizing: border-box; margin:0; padding:0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #app { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width .3s;
            overflow-y: auto;
        }
        .sidebar.collapsed { width: 68px; }
        .sidebar.collapsed .nav-label,
        .sidebar.collapsed .nav-section-title,
        .sidebar.collapsed .brand-name { display: none; }
        
        .sidebar-brand {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }
        .brand-glyph {
            width: 36px; height: 36px;
            background: var(--accent);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
        }
        .brand-name { font-size: 22px; font-weight: 700; }

        .nav-section-title {
            padding: 18px 20px 8px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-faint);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            cursor: pointer;
            transition: .2s;
        }
        .nav-item:hover { background: var(--accent-soft); }
        .nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
        .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }

        .nav-badge {
            margin-left: auto;
            background: var(--danger);
            color: white;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 999px;
        }

        .sidebar-foot {
            margin-top: auto;
            border-top: 1px solid var(--border);
            padding: 12px 0;
        }

        #topbar {
            height: 68px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
            z-index: 10;
        }

        .view {
            flex: 1;
            overflow-y: auto;
            padding: 28px;
            display: none;
        }
        .view:not(.hidden) { display: block; }

        .page-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }
        h1 { font-size: 28px; font-weight: 700; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
        }
        .panel { box-shadow: 0 4px 20px rgba(0,0,0,.04); }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
            margin-bottom: 28px;
        }
        .stat-card .top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            line-height: 1;
        }
        .trend {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .trend.up { color: #22c55e; }
        .trend.down { color: var(--danger); }

        .dash-cols {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 28px;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .section-head h3 { font-size: 17px; }

        .mini-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .mini-row:last-child { border-bottom: none; }
        .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .week-grid {
            display: grid;
            grid-template-columns: 80px repeat(7, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .week-head {
            background: var(--surface);
            padding: 12px 8px;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
        }
        .week-head.today { color: var(--accent); }
        .time-col {
            background: var(--surface);
            border-right: 1px solid var(--border);
        }
        .time-cell {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }
        .day-col {
            background: var(--surface);
            position: relative;
            border-right: 1px solid var(--border);
        }
        .appt {
            position: absolute;
            left: 6px;
            right: 6px;
            border: 2px solid;
            border-radius: 10px;
            padding: 6px 10px;
            font-size: 12.5px;
            cursor: pointer;
            overflow: hidden;
        }

        .grid { display: grid; gap: 18px; }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th { font-weight: 600; color: var(--text-muted); font-size: 13px; }

        .client-avatar {
            width: 42px; height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 12px;
            border: none;
            background: var(--border-strong);
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .btn.dark {
            background: var(--accent);
            color: white;
        }
        .btn.sm { padding: 6px 12px; font-size: 13px; }

        .chip {
            padding: 6px 16px;
            background: var(--border-strong);
            border-radius: 999px;
            font-size: 13px;
            cursor: pointer;
        }
        .chip.active { background: var(--accent); color: white; }

        /* Drawer */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        #overlay.show { display: flex; }
        #client-drawer {
            background: var(--surface);
            width: 480px;
            height: 100%;
            margin-left: auto;
            transform: translateX(100%);
            transition: transform .4s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
        }
        #client-drawer.show { transform: translateX(0); }

        .drawer-head {
            padding: 24px;
            display: flex;
            gap: 18px;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .drawer-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        .dtab {
            padding: 16px 24px;
            cursor: pointer;
            font-weight: 600;
        }
        .dtab.active {
            border-bottom: 3px solid var(--accent);
            color: var(--accent);
        }

        /* Toast */
        #toast-wrap {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            gap: 12px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,.2);
            min-width: 280px;
        }

        /* CMDK */
        #cmdk-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.7);
            display: none;
            align-items: flex-start;
            justify-content: center;
            padding-top: 15vh;
            z-index: 3000;
        }
        #cmdk-overlay.show { display: flex; }
        #cmdk {
            background: var(--surface);
            width: 620px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
        }
        #cmdk-input {
            width: 100%;
            padding: 20px 24px;
            font-size: 18px;
            border: none;
            background: transparent;
            outline: none;
        }
        .cmdk-item {
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
        }
        .cmdk-item:hover, .cmdk-item.sel {
            background: var(--accent-soft);
        }

        /* Other utilities */
        .mono { font-family: ui-monospace, monospace; }
        .hidden { display: none !important; }
        .divider { height: 1px; background: var(--border); margin: 20px 0; }
        .kv-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px 28px;
        }
        .rank-bar-track {
            height: 6px;
            background: var(--border);
            border-radius: 999px;
            overflow: hidden;
        }
        .rank-bar-fill {
            height: 100%;
            background: var(--accent);
        }

        .ba-slider {
            position: relative;
            height: 260px;
            background: #ddd;
            border-radius: 12px;
            overflow: hidden;
            cursor: ew-resize;
        }
        .ba-layer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
        }
        .ba-before { background: linear-gradient(#ccc, #999); }
        .ba-after { background: linear-gradient(#6E2A3B, #3D6E92); }
        .tag {
            position: absolute;
            top: 16px;
            padding: 4px 12px;
            background: rgba(0,0,0,.7);
            color: white;
            border-radius: 999px;
            font-size: 12px;
        }
        .ba-after .tag { right: 16px; }
        .ba-handle {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 6px;
            background: white;
            box-shadow: 0 0 0 4px rgba(0,0,0,.2);
            cursor: ew-resize;
            z-index: 2;
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="login-screen" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;">
        <div style="background:var(--surface);border-radius:20px;padding:48px 60px;width:420px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.1);">
            <div style="font-size:72px;margin-bottom:12px;">🌸</div>
            <h1 style="font-size:32px;margin-bottom:8px;">Auravita</h1>
            <p style="color:var(--text-muted);margin-bottom:32px;">Clínica de Estética Avançada</p>
            
            <div style="margin-bottom:24px;">
                <div style="display:flex;gap:12px;justify-content:center;margin-bottom:16px;">
                    <button class="role-btn active" data-role="Administradora" style="padding:12px 24px;border-radius:12px;border:1px solid var(--border);">Administradora</button>
                    <button class="role-btn" data-role="Recepção" style="padding:12px 24px;border-radius:12px;border:1px solid var(--border);">Recepção</button>
                </div>
                <div style="display:flex;gap:12px;justify-content:center;">
                    <button class="role-btn" data-role="Esteticista" style="padding:12px 24px;border-radius:12px;border:1px solid var(--border);">Esteticista</button>
                    <button class="role-btn" data-role="Financeiro" style="padding:12px 24px;border-radius:12px;border:1px solid var(--border);">Financeiro</button>
                </div>
            </div>
            
            <button id="login-btn" class="btn dark" style="width:100%;padding:16px;font-size:17px;">Entrar no Protótipo</button>
            <p style="margin-top:20px;font-size:12.5px;color:var(--text-faint);">Dados fictícios • Tudo client-side</p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app" class="hidden">
        <!-- SIDEBAR -->
        <div id="sidebar" class="sidebar"></div>

        <!-- MAIN CONTENT -->
        <div style="flex:1;display:flex;flex-direction:column;">
            <!-- TOPBAR -->
            <div id="topbar">
                <button id="toggle-sidebar" class="btn" style="padding:8px 12px;"></button>
                <div style="flex:1;"></div>
                <button id="theme-toggle" class="btn" style="padding:8px 12px;"></button>
                <button id="open-cmdk" class="btn" style="padding:8px 12px;">⌘K</button>
                <div id="topbar-avatar" style="width:34px;height:34px;border-radius:50%;background:var(--accent);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;margin-left:12px;">CR</div>
            </div>

            <!-- VIEWS -->
            <div id="view-dashboard" class="view"></div>
            <div id="view-agenda" class="view"></div>
            <div id="view-clientes" class="view"></div>
            <div id="view-procedimentos" class="view"></div>
            <div id="view-prontuario" class="view"></div>
            <div id="view-financeiro" class="view"></div>
            <div id="view-estoque" class="view"></div>
            <div id="view-marketing" class="view"></div>
            <div id="view-profissionais" class="view"></div>
            <div id="view-relatorios" class="view"></div>
        </div>
    </div>

    <!-- CLIENT DRAWER -->
    <div id="overlay">
        <div id="client-drawer"></div>
    </div>

    <!-- CMDK -->
    <div id="cmdk-overlay">
        <div id="cmdk">
            <input id="cmdk-input" type="text" placeholder="Buscar ou executar comando...">
            <div id="cmdk-list" style="max-height:420px;overflow-y:auto;"></div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast-wrap"></div>

    <script>
        /* ==================== ALL THE PROVIDED JS CODE ==================== */
        /* ============================================================
           AURAVITA — motor do protótipo (dados fictícios, tudo client-side)
           ============================================================ */

        /* ---------- ícones (stroke, 24x24) ---------- */

        const fmtBRLc = n => n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

        function setupBaSlider(){
          const slider = document.getElementById('ba-slider');
          const handle = document.getElementById('ba-handle');
          const wrap = document.getElementById('ba-after-wrap');
          if(!slider) return;
          let dragging=false;
          const move = x => {
            const rect = slider.getBoundingClientRect();
            let pct = ((x-rect.left)/rect.width)*100;
            pct = Math.max(4, Math.min(96, pct));
            handle.style.left = pct+'%';
            wrap.style.width = pct+'%';
          };
          handle.addEventListener('mousedown', ()=>dragging=true);
          window.addEventListener('mouseup', ()=>dragging=false);
          window.addEventListener('mousemove', e=>{if(dragging) move(e.clientX);});
          slider.addEventListener('click', e=>move(e.clientX));
          handle.addEventListener('touchstart', ()=>dragging=true);
          window.addEventListener('touchend', ()=>dragging=false);
          window.addEventListener('touchmove', e=>{if(dragging) move(e.touches[0].clientX);});
        }

        /* ============================================================
           COMMAND PALETTE (⌘K)
           ============================================================ */
        let cmdkSel = 0, cmdkItems = [];
        function buildCmdItems(){
          const nav = ROLE_VIEWS[state.role].map(id=>{
            const n = NAV.find(x=>x.id===id);
            return {icon:n.icon, label:'Ir para '+n.label, tag:'Navegação', action:()=>navigate(id)};
          });
          const actions = [
            {icon:'plus', label:'Novo agendamento', tag:'Ação', action:()=>{navigate('agenda'); toast('Novo agendamento','Selecione um horário na agenda.');}},
            {icon:'plus', label:'Novo cliente', tag:'Ação', action:()=>{navigate('clientes'); toast('Novo cliente','Preencha o cadastro completo.');}},
            {icon:'search', label:'Buscar cliente: Marina Alencar', tag:'Cliente', action:()=>{navigate('clientes'); setTimeout(()=>openClient('c1'),150);}},
            {icon:'download', label:'Exportar relatório financeiro', tag:'Relatório', action:()=>{navigate('financeiro'); toast('Exportando','Relatório PDF gerado com sucesso.');}},
          ];
          return [...actions, ...nav];
        }
        function openCmdk(){
          cmdkItems = buildCmdItems();
          cmdkSel = 0;
          document.getElementById('cmdk-input').value='';
          renderCmdkList(cmdkItems);
          document.getElementById('cmdk-overlay').classList.add('show');
          setTimeout(()=>document.getElementById('cmdk-input').focus(), 60);
        }
        function closeCmdk(){document.getElementById('cmdk-overlay').classList.remove('show');}
        function renderCmdkList(items){
          document.getElementById('cmdk-list').innerHTML = items.length ? items.map((it,i)=>`
            <div class="cmdk-item ${i===cmdkSel?'sel':''}" data-i="${i}">${svg(it.icon)}<span>${it.label}</span><span class="tag">${it.tag}</span></div>
          `).join('') : `<div class="empty-state" style="padding:26px;">${svg('search')}<div>Nenhum resultado.</div></div>`;
          document.querySelectorAll('.cmdk-item').forEach(el=>{
            el.addEventListener('click', ()=>{items[+el.dataset.i].action(); closeCmdk();});
            el.addEventListener('mouseenter', ()=>{cmdkSel=+el.dataset.i; renderCmdkList(items);});
          });
        }
        function setupCmdk(){
          document.getElementById('cmdk-overlay').addEventListener('click', e=>{if(e.target.id==='cmdk-overlay') closeCmdk();});
          document.getElementById('cmdk-input').addEventListener('input', e=>{
            const q = e.target.value.toLowerCase();
            const filtered = cmdkItems.filter(it=>it.label.toLowerCase().includes(q));
            cmdkSel = 0;
            renderCmdkList(filtered);
          });
          document.addEventListener('keydown', e=>{
            if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); openCmdk(); return; }
            if(e.key==='Escape'){ closeCmdk(); closeDrawer(); }
            if(document.getElementById('cmdk-overlay').classList.contains('show')){
              const q = document.getElementById('cmdk-input').value.toLowerCase();
              const filtered = cmdkItems.filter(it=>it.label.toLowerCase().includes(q));
              if(e.key==='ArrowDown'){ e.preventDefault(); cmdkSel=Math.min(cmdkSel+1, filtered.length-1); renderCmdkList(filtered); }
              if(e.key==='ArrowUp'){ e.preventDefault(); cmdkSel=Math.max(cmdkSel-1, 0); renderCmdkList(filtered); }
              if(e.key==='Enter' && filtered[cmdkSel]){ filtered[cmdkSel].action(); closeCmdk(); }
            }
          });
        }

        // Global functions for onclick handlers
        window.navigate = navigate;
        window.openClient = openClient;
        window.closeDrawer = closeDrawer;
        window.toast = toast;
    </script>
